<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ресторанное меню - А3</title>
    
    <!-- Подключение шрифтов Google Fonts с поддержкой кириллицы -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 
    ================================================================
    ГЛАВНЫЙ КОНТЕЙНЕР МЕНЮ
    Размер: 422×299 мм (без bleed)
    Для добавления второй стороны используйте page-break-after: always
    ================================================================ 
    -->
    <div class="menu-page">
        
        <!-- Заголовок меню -->
        <header class="menu-header">
            <h1 class="menu-title">МЕНЮ РЕСТОРАНА</h1>
            <p class="menu-subtitle">Добро пожаловать!</p>
        </header>

        <!-- 
        ================================================================
        РАЗДЕЛ: КОФЕ
        Чтобы изменить данные в разделе, редактируйте содержимое .menu-items-list
        Чтобы добавить новое блюдо, скопируйте элемент <li class="menu-item">
        ================================================================ 
        -->
        <section class="menu-section" id="coffee">
            <h2 class="section-title">Кофе</h2>
            
            <ul class="menu-items-list">
                <!-- Блюдо 1 -->
                <li class="menu-item">
                    <span class="item-name">Эспрессо</span>
                    <span class="item-volume">30 мл</span>
                    <span class="item-price">150 ₽</span>
                </li>
                
                <!-- Блюдо 2 -->
                <li class="menu-item">
                    <span class="item-name">Американо</span>
                    <span class="item-volume">120 мл</span>
                    <span class="item-price">180 ₽</span>
                </li>
                
                <!-- Блюдо 3 -->
                <li class="menu-item">
                    <span class="item-name">Капучино</span>
                    <span class="item-volume">180 мл</span>
                    <span class="item-price">220 ₽</span>
                </li>
                
                <!-- Блюдо 4 -->
                <li class="menu-item">
                    <span class="item-name">Латте</span>
                    <span class="item-volume">240 мл</span>
                    <span class="item-price">250 ₽</span>
                </li>
                
                <!-- Блюдо 5 -->
                <li class="menu-item">
                    <span class="item-name">Флэт Уайт</span>
                    <span class="item-volume">150 мл</span>
                    <span class="item-price">240 ₽</span>
                </li>
                
                <!-- Блюдо 6 -->
                <li class="menu-item">
                    <span class="item-name">Раф кофе</span>
                    <span class="item-volume">200 мл</span>
                    <span class="item-price">280 ₽</span>
                </li>
                
                <!-- Блюдо 7 -->
                <li class="menu-item">
                    <span class="item-name">Глясе</span>
                    <span class="item-volume">200 мл</span>
                    <span class="item-price">260 ₽</span>
                </li>
                
                <!-- Блюдо 8 -->
                <li class="menu-item">
                    <span class="item-name">Мокачино</span>
                    <span class="item-volume">240 мл</span>
                    <span class="item-price">270 ₽</span>
                </li>
            </ul>
            
            <!-- Примечание к разделу (рукописные дополнения) -->
            <aside class="section-note">
                <em>* Возможна замена молока на растительное (+50 ₽)</em>
            </aside>
        </section>

        <!-- Декоративный разделитель -->
        <div class="decorative-divider"></div>

        <!-- 
        ================================================================
        СЮДА МОЖНО ДОБАВИТЬ ДРУГИЕ РАЗДЕЛЫ:
        - Завтрак
        - Салаты
        - Первые блюда
        - Восточная кухня
        - Чебуреки
        - Гарниры
        - Фреши
        - Милкшейки
        - Смузи
        - Соусы
        - Хлеб
        - Шашлык
        ================================================================ 
        -->

    </div>

    <!-- 
    ================================================================
    ВТОРАЯ СТРАНИЦА (ОБОРОТНАЯ СТОРОНА)
    Раскомментируйте для создания двухстороннего меню
    ================================================================ 
    -->
    <!--

        <header class="menu-header">
            <h1 class="menu-title">МЕНЮ РЕСТОРАНА</h1>
            <p class="menu-subtitle">Продолжение</p>
        </header>
        
        <section class="menu-section">
            <h2 class="section-title">Завтрак</h2>
            <ul class="menu-items-list">
                <li class="menu-item">
                    <span class="item-name">Название блюда</span>
                    <span class="item-volume">200 г</span>
                    <span class="item-price">350 ₽</span>
                </li>
            </ul>
        </section>
    </div>
    -->

</body>
</html>
