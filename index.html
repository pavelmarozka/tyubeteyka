<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ресторанное меню - А3</title>
    
    <!-- Подключение шрифтов Google Fonts с поддержкой кириллицы -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 
    ================================================================
    ПЕРВАЯ СТРАНИЦА (ЛИЦЕВАЯ)
    Размер: 422×299 мм (без bleed)
    Данные загружаются из menu.json автоматически
    ================================================================ 
    -->
    <div class="menu-page" id="page1">
        <div class="guide guide-outer"></div>
        <div class="guide guide-trim"></div>
        <div class="guide guide-safe"></div>
        
        <!-- 
        ================================================================
        ТРЁХКОЛОНОЧНАЯ СЕТКА
        Секции будут загружены через JavaScript из menu.json
        ================================================================ 
        -->
        <div class="three-column-grid" id="menu-content-page1">
            <div class="menu-col" id="col1-page1">
                <div class="logo-container" id="logo-page1">
                    <img src="logo.png" alt="Логотип">
                </div>
            </div>
            <div class="menu-col" id="col2-page1"></div>
            <div class="menu-col" id="col3-page1"></div>
        </div>

    </div>
    
    <!-- 
    ================================================================
    РАЗРЫВ СТРАНИЦЫ (для двухсторонней печати)
    ================================================================ 
    -->
    <div class="page-break"></div>

    <!-- 
    ================================================================
    ВТОРАЯ СТРАНИЦА (ОБОРОТНАЯ СТОРОНА)
    ================================================================ 
    -->
    <div class="menu-page" id="page2">
        <div class="guide guide-outer"></div>
        <div class="guide guide-trim"></div>
        <div class="guide guide-safe"></div>
        
        <!-- Контейнер для остальных секций -->
        <div class="three-column-grid" id="menu-content-page2">
            <div class="menu-col" id="col1-page2">
                <div class="logo-container" id="logo-page2">
                    <img src="logo.png" alt="Логотип">
                </div>
            </div>
            <div class="menu-col" id="col2-page2">
                <div class="col-image-container">
                    <img src="coffee.png" alt="Кофе">
                </div>
            </div>
            <div class="menu-col" id="col3-page2">
                <div class="col-image-container">
                    <img src="limunade.png" alt="Лимонад">
                </div>
            </div>
        </div>

    </div>

    <script>

        // Иконки для категорий
        const CATEGORY_ICONS = {
            'Кофе': 'fa-mug-hot',
            'Безалкогольные напитки': 'fa-glass-water',
            'Десерты': 'fa-cake-candles',
            'Завтрак': 'fa-sun',
            'Салаты': 'fa-leaf',
            'Первые блюда': 'fa-bowl-food',
            'Восточная кухня': 'fa-utensils',
            'Чебуреки': 'fa-wheat-awn',
            'Гарниры': 'fa-carrot',
            'Фреши': 'fa-lemon',
            'Лимонады': 'fa-blender',
            'Смузи': 'fa-apple-whole',
            'Соусы': 'fa-droplet',
            'Хлеб': 'fa-bread-slice',
            'Блюда на мангале': 'fa-fire',
            'Чай': 'fa-mug-saucer'
        };

        // НАСТРОЙКИ: расположение категорий на первой странице
        // Колонка 1: логотип (уже в HTML) + категории под ним
        // Колонка 2: категории сверху
        // Колонка 3: категории сверху
        const PAGE1_LAYOUT = [
            { col: 1, categories: ['Первые блюда', 'Чебуреки', 'Хлеб'] },
            { col: 2, categories: ['Завтрак', 'Гарниры', 'Восточная кухня', 'Соусы'] },
            { col: 3, categories: ['Салаты', 'Блюда на мангале'] }
        ];

        // НАСТРОЙКИ: расположение категорий на второй странице
        // Колонка 1: логотип (уже в HTML) + категории под ним
        // Колонка 2: категории сверху
        // Колонка 3: категории сверху
        const PAGE2_LAYOUT = [
            { col: 1, categories: ['Лимонады', 'Смузи', 'Фреши'] },
            { col: 2, categories: ['Кофе', 'Безалкогольные напитки'] },
            { col: 3, categories: ['Чай', 'Десерты'] }
        ];

        // Рендер одной категории в HTML
        function renderCategory(category) {
            if (!category.меню || category.меню.length === 0) return '';
            
            let html = `
                    <article class="menu-section">
                        <h2 class="section-title"><i class="fas ${CATEGORY_ICONS[category.категория] || ''}"></i> ${escapeHtml(category.категория)}</h2>
                        <ul class="menu-items-list">
            `;
            
            category.меню.forEach(item => {
                const priceDisplay = item.цена != null ? `${item.цена} ₽` : '—';
                const volumeDisplay = item.объём || '';
                const noteHtml = item.примечание ? `<span class="item-note">${escapeHtml(item.примечание)}</span>` : '';
                
                html += `
                        <li class="menu-item">
                            <span class="item-name">${escapeHtml(item.наименование)}</span>
                            <span class="item-volume">${escapeHtml(volumeDisplay)}</span>
                            <span class="item-price">${priceDisplay}</span>
                            ${noteHtml}
                        </li>
                `;
            });
            
            html += `
                        </ul>
            `;

            if (category.примечание) {
                html += `<p class="section-note">${escapeHtml(category.примечание)}</p>`;
            }

            html += `
                    </article>
            `;
            
            return html;
        }

        // Инициализация меню (загрузка из menu.json)
        async function initMenu() {
            try {
                const response = await fetch('menu.json');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const menuData = await response.json();
                renderAll(menuData);
            } catch (e) {
                console.error('Ошибка загрузки menu.json:', e);
                document.getElementById('menu-content-page1').innerHTML =
                    '<p class="loading-message">Ошибка загрузки menu.json. Откройте через сервер или используйте node tools/export-pdf.js</p>';
            }
        }

        function renderAll(menuData) {
            
            // Индекс категорий по названию
            const categoryMap = {};
            menuData.forEach(cat => { categoryMap[cat.категория] = cat; });
            
            const usedCategories = new Set();
            
            // Первая страница — ручная раскладка по колонкам
            PAGE1_LAYOUT.forEach(({ col, categories }) => {
                const container = document.getElementById(`col${col}-page1`);
                let html = '';
                categories.forEach(catName => {
                    const cat = categoryMap[catName];
                    if (!cat || !cat.меню || cat.меню.length === 0) return;
                    usedCategories.add(catName);
                    html += renderCategory(cat);
                });
                container.insertAdjacentHTML('beforeend', html);
            });
            
            // Вторая страница — ручная раскладка по колонкам
            PAGE2_LAYOUT.forEach(({ col, categories }) => {
                const container = document.getElementById(`col${col}-page2`);
                let html = '';
                categories.forEach(catName => {
                    const cat = categoryMap[catName];
                    if (!cat || !cat.меню || cat.меню.length === 0) return;
                    html += renderCategory(cat);
                });
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        // Рендеринг секций меню в контейнер
        function renderMenuPage(containerId, categories) {
            const container = document.getElementById(containerId);
            if (!categories || categories.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            categories.forEach(category => {
                html += renderCategory(category);
            });
            
            container.innerHTML = html;
        }

        // Запуск после загрузки DOM
        document.addEventListener('DOMContentLoaded', initMenu);

        // Экранирование HTML для безопасности
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>

</body>
</html>
