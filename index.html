<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ресторанное меню - А3</title>
    
    <!-- Подключение шрифтов Google Fonts с поддержкой кириллицы -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 
    ================================================================
    ПЕРВАЯ СТРАНИЦА (ЛИЦЕВАЯ)
    Размер: 422×299 мм (без bleed)
    Данные загружаются из menu.json автоматически
    ================================================================ 
    -->
    <div class="menu-page" id="page1">
        
        <!-- Заголовок меню -->
        <header class="menu-header">
            <h1 class="menu-title">МЕНЮ РЕСТОРАНА</h1>
            <p class="menu-subtitle">Добро пожаловать!</p>
        </header>

        <!-- 
        ================================================================
        ТРЁХКОЛОНОЧНАЯ СЕТКА
        Секции будут загружены через JavaScript из menu.json
        ================================================================ 
        -->
        <div class="three-column-grid" id="menu-content-page1">
            <!-- Секции меню будут вставлены здесь через JS -->
            <p class="loading-message">Загрузка меню...</p>
        </div>

    </div>
    
    <!-- 
    ================================================================
    РАЗРЫВ СТРАНИЦЫ (для двухсторонней печати)
    ================================================================ 
    -->
    <div class="page-break"></div>

    <!-- 
    ================================================================
    ВТОРАЯ СТРАНИЦА (ОБОРОТНАЯ СТОРОНА)
    ================================================================ 
    -->
    <div class="menu-page" id="page2">
        
        <header class="menu-header">
            <h1 class="menu-title">ПРОДОЛЖЕНИЕ МЕНЮ</h1>
            <p class="menu-subtitle"></p>
        </header>
        
        <!-- Контейнер для остальных секций -->
        <div class="three-column-grid" id="menu-content-page2">
            <!-- Секции меню будут вставлены здесь через JS -->
        </div>

    </div>

    <!-- 
    ================================================================
    СКРИПТ ЗАГРУЗКИ ДАННЫХ
    Загружает menu.json и распределяет категории по страницам
    Для изменения количества категорий на странице измените 
    CATEGORIES_PER_PAGE в начале скрипта
    ================================================================ 
    -->
    <script>
        // НАСТРОЙКИ: количество категорий на первой странице
        const CATEGORIES_PER_PAGE = {
            page1: 8,  // Первые 8 категорий на лицевой стороне
            page2: 100 // Остальные на оборотной
        };

        // Загрузка данных из JSON файла
        async function loadMenu() {
            try {
                const response = await fetch('menu.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const menuData = await response.json();
                
                // Распределяем категории между двумя страницами
                const categoriesPage1 = menuData.slice(0, CATEGORIES_PER_PAGE.page1);
                const categoriesPage2 = menuData.slice(CATEGORIES_PER_PAGE.page1);
                
                renderMenuPage('menu-content-page1', categoriesPage1);
                renderMenuPage('menu-content-page2', categoriesPage2);
            } catch (error) {
                console.error('Ошибка загрузки меню:', error);
                document.getElementById('menu-content-page1').innerHTML = 
                    '<p style="color: red; font-size: 18px;">⚠ Ошибка загрузки меню. Проверьте файл menu.json</p>';
            }
        }

        // Рендеринг секций меню на странице
        function renderMenuPage(containerId, categories) {
            const container = document.getElementById(containerId);
            if (!categories || categories.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            
            categories.forEach(category => {
                // Пропускаем пустые категории
                if (!category.меню || category.меню.length === 0) return;
                
                html += `
                    <article class="menu-section">
                        <h2 class="section-title">${escapeHtml(category.категория)}</h2>
                        <ul class="menu-items-list">
                `;
                
                category.меню.forEach(item => {
                    // Обработка цены (если null или 0, показываем "—")
                    const priceDisplay = item.цена ? `${item.цена} ₽` : '—';
                    const volumeDisplay = item.объём || '';
                    // Добавляем класс has-note если есть примечание (для подсветки при наведении)
                    const noteClass = item.примечание ? ' has-note' : '';
                    const noteTitle = item.примечание ? ` title="${escapeHtml(item.примечание)}"` : '';
                    
                    html += `
                        <li class="menu-item${noteClass}"${noteTitle}>
                            <span class="item-name">${escapeHtml(item.наименование)}</span>
                            <span class="item-volume">${escapeHtml(volumeDisplay)}</span>
                            <span class="item-price">${priceDisplay}</span>
                        </li>
                    `;
                });
                
                html += `
                        </ul>
                    </article>
                `;
            });
            
            container.innerHTML = html;
        }

        // Экранирование HTML для безопасности
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Запуск после загрузки DOM
        document.addEventListener('DOMContentLoaded', loadMenu);
    </script>

</body>
</html>
